name: GeoCognition CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    environment: dev

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: geocog-postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geocog-postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MINIO_ROOT_USER: ${{ vars.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      AIRFLOW_CONN_USGS_API: ${{ vars.AIRFLOW_CONN_USGS_API }}
      AIRFLOW_CONN_GEOCOG_POSTGRES_DB: ${{ secrets.AIRFLOW_CONN_GEOCOG_POSTGRES_DB }}
      GEOCOG_DATABASE_URL: ${{ secrets.GEOCOG_DATABASE_URL }}
      AIRFLOW__CORE__DAGS_FOLDER: '${{ github.workspace }}/dags'
      # Prevent Airflow from loading example DAGs that require extra dependencies
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set Airflow home
        run: echo "AIRFLOW_HOME=${{ github.workspace }}/.airflow" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-webapp.txt

      # ✅ Initialize Airflow DB
      - name: Initialize Airflow metadata DB
        run: |
          airflow db migrate

      # ✅ LINT STEP (Ruff)
      - name: Run Ruff (lint)
        run: |
          ruff check . --exclude prototype

      # ✅ FORMAT CHECK (Black)
      - name: Run Black (format check)
        run: |
          black --check . --exclude prototype/

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=$MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD \
            minio/minio server /data --console-address ":9001"

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5433 -U postgres -d geocog-postgres && exit 0
            sleep 2
          done
          echo "Postgres did not become ready in time."
          exit 1

      - name: Wait for MinIO
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:9000/minio/health/live && exit 0
            sleep 2
          done
          echo "MinIO did not become ready in time."
          docker logs minio || true
          exit 1

      - name: Run backend health check
        run: |
          uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          UVICORN_PID=$!
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 2
          done
          kill $UVICORN_PID

      - name: Run pytest
        run: |
          pytest -v --maxfail=1 --disable-warnings

      - name: Build Docker image
        run: |
          docker build -t geocognition-ci .

      - name: Show MinIO logs on failure
        if: failure()
        run: docker logs minio || true

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Build
        run: npm run build