version: '3'
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geocog-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: geocog-postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airflow_network

  minio:
    image: minio/minio:latest
    container_name: geocog-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - airflow_network

  backend:
    image: python:3.10-slim
    container_name: geocog-backend
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      GEOCOG_DATABASE_URL: ${GEOCOG_DATABASE_URL}
    command: >
      sh -c "pip install --no-cache-dir -r requirements-webapp.txt &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - airflow_network
    stop_grace_period: 1s

  frontend:
    image: node:20-alpine
    container_name: geocog-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - airflow_network
    stop_grace_period: 1s

networks:
  airflow_network:
    external: false

volumes:
  postgres_data:
  minio_data: